<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    
    <!-- SEO : Optimisation pour la visibilité sur les moteurs de recherche -->
    <title>World Cup 2026 Mujos Octopus 2 | Oracle IA Football</title>
    <meta name="description" content="Découvrez World Cup 2026 Mujos Octopus 2, l'oracle IA ultime pour vos pronostics, scores en direct et analyses des 48 nations de la Coupe du Monde 2026." />
    <meta name="keywords" content="Mujos Octopus 2, World Cup 2026, pronostics foot IA, scores coupe du monde, simulateur match, oracle football" />
    
    <style>
        /* Variables de couleurs pour garder ton identité visuelle */
        :root { 
            --usa: #0066CC; --canada: #E53935; --mexico: #00A651; 
            --gold: #D4AF37; --dark: #04080F; --light: #F8FAFC; 
        }
        
        body { background: var(--dark); color: var(--light); font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        header { padding: 2rem 1rem; border-bottom: 1px solid var(--usa); }
        h1 { font-size: 2rem; background: linear-gradient(90deg, var(--mexico), var(--usa), var(--canada)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .lang-selector { margin: 1rem 0; display: flex; justify-content: center; gap: 8px; }
        nav { display: flex; justify-content: center; gap: 10px; padding: 1rem; flex-wrap: wrap; }
        
        button { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--usa); background: #111; color: #fff; cursor: pointer; transition: 0.3s; }
        button.active { background: var(--usa); border-color: var(--usa); }
        button:hover { background: var(--mexico); }
        
        .section { display: none; padding: 2rem; max-width: 900px; margin: 0 auto; }
        .section.active { display: block; }
    </style>
</head>
<body>

    <header>
        <!-- Conteneur de la mascotte géré par mascotte.js -->
        <div id="mascotte-container"></div>
        <h1>World Cup 2026 Mujos Octopus 2</h1>
        
        <!-- Sélecteur de langue -->
        <div class="lang-selector">
            <button onclick="changerLangue('fr')">🇫🇷 FR</button>
            <button onclick="changerLangue('en')">🇬🇧 EN</button>
            <button onclick="changerLangue('pt')">🇵🇹 PT</button>
        </div>
    </header>

    <nav>
        <button onclick="tab('groups', this)" class="active">GROUPES</button>
        <button onclick="tab('schedule', this)">CALENDRIER</button>
        <button onclick="tab('predict', this)">PRÉDICTIONS</button>
        <button onclick="tab('dossier', this)">DOSSIERS</button>
        <button onclick="tab('news', this)">NEWS</button>
    </nav>

    <!-- Sections du site -->
    <div id="groups" class="section active"></div>
    <div id="schedule" class="section"></div>
    <div id="predict" class="section"></div>
    <div id="dossier" class="section"></div>
    <div id="news" class="section"></div>

    <!-- Le moteur de ton application -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
